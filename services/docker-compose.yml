
services:
  frontend:
    container_name:
      frontend
    build:
      \diploma-frontend
    ports:
      - "3000:5173"
    depends_on:
      gateway:
        condition: service_started

  gateway:
    container_name:
      gateway
    build:
      \diploma-gateway
    ports: 
      - 8081:8080

  # migrate:
  #   container_name:
  #     migrate
  #   build:
  #     context: .
  #     dockerfile: \migrate-service\Dockerfile
  #   env_file:
  #     .\diploma-gateway\.env
  #   depends_on:
  #     database:
  #       condition: service_healthy

  database:
    container_name:
      database
    image:
      postgres:18.3-bookworm
    env_file:
      .\diploma-gateway\.env
    ports:
      - 5433:5432
    healthcheck:
       test: ["CMD-SHELL", "pg_isready -U user"]
       interval: 5s
       timeout: 5s
       retries: 5
